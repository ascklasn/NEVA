General:
    epochs: &epochs 100
    seed: 42
    acc_steps: 1
    metric: "val_auc"


fold: 0

Data:
    FM_type: 'Patch_Multimodal'  # FM的类型，Patch_Multimodal, Slide_Vision等
    FM_name: 'neva'  # FM的类型，chief, titan、neva等
    dataset_type: 'cls'
    dataset_name: "nmyc"
    cohort_name: 'Prospective_1' # choices=['Prospective_1', 'Prospective_2', 'Internal', 'PUFH', 'Shenzhen', 'GCI']
    image_dir: null
    report_dir: null   # 文本的ids和pads
    eval_df: null      # /mnt/hdd2_4t/hrz/神经母细胞瘤/训练集和内部测试集/dataframes/seed_42/1p36.csv

Model:
    name: "models.neva.NEVA"  # "models.neva.NEVA"  "models.fm_slide_level.FM_Slide_Level"  "models.fm_patch_level.FM_Patch_Level"
    FM_type: 'Patch_Multimodal'
    FM_name: 'neva'
    wts_path: null # 模型权重位置 /home/huruizhen/NEVA_lora/neva_wts/11q23/seed=42_fold=2/fold_2.pth
    params:
        image_mil_name: "models.clam.CLAM_Batch"
        mil_params:
            hidden_feat: 768
            gate: true
            size_arg: 'small'
            dropout: true
            instance_eval: false
            subtyping: false
            k_sample: 16
        feat_dim: 1024
        num_classes: 2
        return_feat: false
        image_only: false
        report_only: false


Optimizer:
    optimizer:
        name: Adam
        params:
            lr: 0.001
            weight_decay: 0.01
            amsgrad: False
    lr_scheduler:
        name: CosineAnnealingLR
        params:
            T_max: *epochs
            last_epoch: -1



# 将这个loss进行分类，如果是Classification任务，就用交叉熵损失函数，如果是回归任务，就用CoxSurvLoss
Loss:
    name: "torch.nn.CrossEntropyLoss"
    params:
        reduction: 'mean'


