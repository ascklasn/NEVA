General:
    epochs: &epochs 100
    seed: 42
    acc_steps: 1
    metric: "val_auc"

fold: 0

Data:
    FM_type: 'Slide_Multimodal'  # FM的类型，Patch_Multimodal, Slide_Vision等
    FM_name: 'titan'  # chief, titan等
    dataset_type: 'cls'
    dataset_name: "nmyc"
    cohort_name: 'Prospective_1' # choices=['Prospective_1', 'Prospective_2', 'Internal', 'PUFH', 'Shenzhen', 'GCI']
    image_dir: null
    report_dir: null  
    dataframe: "/home/huruizhen/NEVA_lora/workspace/splits/nmyc.csv"   # 换成mnt目录中的了
    test_df: null
    eval_df: null
    batch_size: 12
    num_workers: 1
    wsi_batch: true

Model:
    name: "models.baseline.Slide_FM"
    FM_name: 'titan'
    FM_type: 'Slide_Multimodal'
    wts_path: null
    params:
        FM_type: 'Slide_Multimodal'  # FM的类型，Slide_Multimodal,  Slide_Vision
        feat_dim: 768
        report_feat_dim: 768
        align_dim: null
        num_classes: 2


Optimizer:
    optimizer:
        name: Adam
        params:
            lr: 0.001
            weight_decay: 0.01
            amsgrad: False
    lr_scheduler:
        name: CosineAnnealingLR
        params:
            T_max: *epochs
            last_epoch: -1



# 将这个loss进行分类，如果是Classification任务，就用交叉熵损失函数，如果是回归任务，就用CoxSurvLoss
Loss:
    name: "torch.nn.CrossEntropyLoss"
    params:
        reduction: 'mean'


